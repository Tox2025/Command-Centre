<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earnings Calendar — Command Center</title>
  <meta name="description" content="Monthly earnings calendar with drill-down reports, 4-step pre-earnings analysis, and newsletter-format briefs">
  <link rel="stylesheet" href="styles.css?v=15">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── Earnings Calendar Styles ───────────────────────── */
    .earnings-page { padding: 16px; max-width: 1600px; margin: 0 auto; }

    /* Month Navigation */
    .month-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }
    .month-nav h1 { font-size: 28px; font-weight: 700; color: #e2e8f0; margin: 0; min-width: 300px; text-align: center; }
    .month-nav button {
      background: rgba(99, 102, 241, 0.15); border: 1px solid rgba(99, 102, 241, 0.3); color: #818cf8;
      padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: 600;
      transition: all 0.2s;
    }
    .month-nav button:hover { background: rgba(99, 102, 241, 0.3); transform: translateY(-1px); }
    .month-nav .btn-today {
      font-size: 12px; padding: 6px 14px; background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.3); color: #34d399;
    }

    /* Calendar Grid */
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 24px; }
    .cal-day-header {
      text-align: center; font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase;
      padding: 8px 4px; background: rgba(30, 41, 59, 0.5);
    }
    .cal-day {
      min-height: 100px; background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(51, 65, 85, 0.4);
      border-radius: 6px; padding: 6px; cursor: pointer; transition: all 0.2s; position: relative;
    }
    .cal-day:hover { border-color: rgba(99, 102, 241, 0.5); background: rgba(30, 41, 59, 0.8); }
    .cal-day.selected { border-color: #818cf8; box-shadow: 0 0 12px rgba(99, 102, 241, 0.3); }
    .cal-day.today { border-color: #34d399; box-shadow: inset 0 0 0 1px rgba(52, 211, 153, 0.3); }
    .cal-day.other-month { opacity: 0.35; }
    .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
    .cal-day-num { font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 4px; }
    .cal-day.today .cal-day-num { color: #34d399; }
    .cal-earnings-dots { display: flex; flex-wrap: wrap; gap: 2px; }
    .cal-earning-dot {
      font-size: 9px; padding: 1px 4px; border-radius: 3px; font-weight: 600; color: #fff;
      line-height: 1.3; cursor: pointer; transition: all 0.15s;
    }
    .cal-earning-dot:hover { transform: scale(1.1); opacity: 0.9; }
    .cal-earning-dot.bmo { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .cal-earning-dot.amc { background: linear-gradient(135deg, #6366f1, #4f46e5); }
    .cal-earning-dot.unknown { background: rgba(100, 116, 139, 0.5); }
    .cal-count { position: absolute; top: 4px; right: 6px; font-size: 10px; color: #64748b; }

    /* Drill-Down Panel */
    .drill-down { margin-bottom: 24px; }
    .drill-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .drill-header h2 { font-size: 20px; color: #e2e8f0; margin: 0; }
    .drill-header .drill-date { color: #818cf8; font-weight: 500; }
    .drill-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .drill-section {
      background: rgba(15, 23, 42, 0.7); border: 1px solid rgba(51, 65, 85, 0.4); border-radius: 10px; padding: 14px;
    }
    .drill-section h3 { font-size: 13px; color: #94a3b8; margin: 0 0 10px; text-transform: uppercase; letter-spacing: 0.5px; }
    .drill-section h3 .time-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-left: 6px;
    }
    .time-badge.bmo { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
    .time-badge.amc { background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff; }
    .drill-table { width: 100%; border-collapse: collapse; }
    .drill-table th {
      font-size: 10px; color: #64748b; text-transform: uppercase; text-align: left;
      padding: 4px 8px; border-bottom: 1px solid rgba(51, 65, 85, 0.4);
    }
    .drill-table td { font-size: 12px; color: #cbd5e1; padding: 6px 8px; border-bottom: 1px solid rgba(51, 65, 85, 0.2); }
    .drill-table tr { cursor: pointer; transition: background 0.15s; }
    .drill-table tr:hover { background: rgba(99, 102, 241, 0.1); }
    .drill-ticker { color: #818cf8; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
    .drill-cap { color: #64748b; font-size: 11px; }
    .drill-empty { color: #475569; font-style: italic; padding: 20px; text-align: center; }

    /* ── Report Modal ─────────────────────────────────── */
    .report-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.75); z-index: 1000; overflow-y: auto; padding: 30px;
      backdrop-filter: blur(6px);
    }
    .report-overlay.active { display: flex; justify-content: center; }
    .report-container {
      width: 100%; max-width: 900px; background: linear-gradient(180deg, #0f172a, #1e293b);
      border: 1px solid rgba(99, 102, 241, 0.3); border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); margin: auto;
    }

    /* Report Header — Newsletter Style */
    .report-header {
      background: linear-gradient(135deg, #0c2e1a, #0a2540);
      border-bottom: 3px solid #34d399; padding: 24px; border-radius: 16px 16px 0 0;
      display: flex; align-items: center; gap: 16px;
    }
    .report-header .rh-logo {
      width: 56px; height: 56px; border-radius: 12px; background: rgba(52, 211, 153, 0.15);
      border: 1px solid rgba(52, 211, 153, 0.3); display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800; color: #34d399;
    }
    .report-header .rh-logo img { width: 100%; height: 100%; border-radius: 12px; object-fit: contain; }
    .report-header .rh-info { flex: 1; }
    .report-header .rh-ticker { font-size: 24px; font-weight: 800; color: #34d399; font-family: 'JetBrains Mono', monospace; }
    .report-header .rh-name { font-size: 14px; color: #94a3b8; margin-top: 2px; }
    .report-header .rh-date { font-size: 12px; color: #64748b; margin-top: 4px; }
    .report-header .rh-close {
      background: none; border: none; color: #64748b; font-size: 24px; cursor: pointer;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      border-radius: 8px; transition: all 0.2s;
    }
    .report-header .rh-close:hover { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

    /* Prediction Banner */
    .prediction-banner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; background: rgba(15, 23, 42, 0.6);
      border-bottom: 1px solid rgba(51, 65, 85, 0.4);
    }
    .pred-verdict {
      font-size: 20px; font-weight: 800; letter-spacing: 1px;
    }
    .pred-verdict.BEAT { color: #34d399; }
    .pred-verdict.MISS { color: #ef4444; }
    .pred-verdict.NEUTRAL { color: #f59e0b; }
    .pred-confidence { font-size: 14px; color: #94a3b8; }
    .pred-confidence strong { font-size: 22px; font-weight: 800; }
    .pred-summary { font-size: 12px; color: #64748b; max-width: 400px; }

    /* Step Cards */
    .report-body { padding: 20px 24px; }
    .step-card {
      background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(51, 65, 85, 0.4);
      border-radius: 12px; padding: 16px; margin-bottom: 16px;
    }
    .step-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .step-num {
      font-size: 10px; font-weight: 700; color: #818cf8; text-transform: uppercase; letter-spacing: 1px;
    }
    .step-verdict {
      font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    }
    .step-verdict.BULLISH, .step-verdict.CLEAN, .step-verdict.positive { background: rgba(52, 211, 153, 0.15); color: #34d399; border: 1px solid rgba(52, 211, 153, 0.3); }
    .step-verdict.BEARISH, .step-verdict.negative { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }
    .step-verdict.NEUTRAL, .step-verdict.mixed { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }

    .step-data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
    .step-metric { }
    .step-metric-label { font-size: 10px; color: #64748b; text-transform: uppercase; margin-bottom: 2px; }
    .step-metric-value { font-size: 14px; font-weight: 600; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; }

    /* Insider Table */
    .insider-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .insider-table th { font-size: 10px; color: #64748b; text-align: left; padding: 4px 6px; border-bottom: 1px solid rgba(51,65,85,0.4); }
    .insider-table td { font-size: 11px; color: #cbd5e1; padding: 5px 6px; border-bottom: 1px solid rgba(51,65,85,0.2); }
    .insider-sale { color: #ef4444; }
    .insider-buy { color: #34d399; }

    /* Analyst Table */
    .analyst-table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    .analyst-table th { font-size: 10px; color: #64748b; text-align: left; padding: 4px 6px; border-bottom: 1px solid rgba(51,65,85,0.4); }
    .analyst-table td { font-size: 11px; color: #cbd5e1; padding: 5px 6px; border-bottom: 1px solid rgba(51,65,85,0.2); }

    /* Company Overview Section */
    .company-overview {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      padding: 16px 24px; border-bottom: 1px solid rgba(51, 65, 85, 0.3);
    }
    .co-desc { font-size: 12px; color: #94a3b8; line-height: 1.6; }
    .co-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .co-stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; }
    .co-stat-value { font-size: 13px; font-weight: 600; color: #e2e8f0; }

    /* Earnings History Bar Chart */
    .earnings-history-chart { display: flex; align-items: flex-end; gap: 6px; height: 80px; margin-top: 10px; }
    .eh-bar {
      flex: 1; border-radius: 4px 4px 0 0; min-width: 30px; position: relative; transition: all 0.3s;
    }
    .eh-bar.beat { background: linear-gradient(180deg, #34d399, #059669); }
    .eh-bar.miss { background: linear-gradient(180deg, #ef4444, #dc2626); }
    .eh-bar-label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 9px; color: #64748b; white-space: nowrap; }
    .eh-bar-value { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 9px; color: #e2e8f0; font-weight: 600; white-space: nowrap; }

    /* Loading spinner */
    .report-loading { text-align: center; padding: 60px; color: #64748b; font-size: 14px; }
    .report-loading .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(99,102,241,0.2); border-top-color: #818cf8;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 768px) {
      .cal-grid { gap: 1px; }
      .cal-day { min-height: 70px; padding: 4px; }
      .drill-sections { grid-template-columns: 1fr; }
      .company-overview { grid-template-columns: 1fr; }
      .report-overlay { padding: 10px; }
    }
  </style>
</head>

<body>
  <!-- Top Bar (matching main dashboard) -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <span class="logo-icon">&#9670;</span>
        <span class="logo-text">COMMAND CENTER</span>
      </div>
    </div>
    <div class="topbar-center">
      <h2 style="color:#e2e8f0;margin:0;font-size:16px">📅 Earnings Calendar</h2>
    </div>
    <div class="topbar-right"></div>
  </header>

  <!-- Navigation -->
  <nav class="nav-bar">
    <a href="/" class="nav-link" id="navDashboard">
      <span class="nav-icon">&#9632;</span> Dashboard
    </a>
    <a href="/paper-trading.html" class="nav-link" id="navPaperTrading">
      <span class="nav-icon">&#9881;</span> Paper Trading
    </a>
    <a href="/options-paper-trading.html" class="nav-link" id="navOptionsPaper">
      <span class="nav-icon">&#128203;</span> Options Paper
    </a>
    <a href="/earnings.html" class="nav-link active" id="navEarnings">
      <span class="nav-icon">📅</span> Earnings
    </a>
    <a href="/reports.html" class="nav-link" id="navReports">
      <span class="nav-icon">&#128202;</span> Reports
    </a>
  </nav>

  <!-- Main Content -->
  <div class="earnings-page">
    <!-- Month Navigation -->
    <div class="month-nav">
      <button onclick="changeMonth(-1)" title="Previous Month">◀</button>
      <button class="btn-today" onclick="goToday()">Today</button>
      <h1 id="monthTitle">March 2026</h1>
      <button onclick="changeMonth(1)" title="Next Month">▶</button>
    </div>

    <!-- Calendar Grid -->
    <div class="cal-grid" id="calendarGrid">
      <!-- Day headers -->
      <div class="cal-day-header">Sun</div>
      <div class="cal-day-header">Mon</div>
      <div class="cal-day-header">Tue</div>
      <div class="cal-day-header">Wed</div>
      <div class="cal-day-header">Thu</div>
      <div class="cal-day-header">Fri</div>
      <div class="cal-day-header">Sat</div>
    </div>

    <!-- Day Drill-Down Panel -->
    <div class="drill-down" id="drillDown" style="display:none">
      <div class="drill-header">
        <h2>📋 <span id="drillTitle">Earnings for</span></h2>
        <span class="drill-date" id="drillDate"></span>
      </div>
      <div class="drill-sections" id="drillSections"></div>
    </div>
  </div>




  <script src="earnings.js"></script>
</body>
</html>
